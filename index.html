<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Flyer Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <div class="controls">
        <h1>Flyer Generator</h1>
        <p class="subtitle">Personalize your 10th Legislative Summit flyer.</p>
        
        <div class="input-group">
          <label for="userName">Full Name</label>
          <input type="text" id="userName" placeholder="Enter your name" />
        </div>

        <div class="input-group">
          <label for="portfolioTitle">Portfolio Title</label>
          <input type="text" id="portfolioTitle" placeholder="e.g. SRC Representative / Delegate" />
        </div>

        <div class="input-group">
          <label>Profile Image</label>
          <div class="file-upload">
            <p id="file-status">Click or drag image to upload</p>
            <input type="file" id="imageInput" accept="image/*" />
          </div>
        </div>

        <div class="actions">
          <button id="generateBtn" class="btn-generate">Generate Flyer</button>
          <button id="downloadBtn" class="btn-download" disabled>Download</button>
        </div>
      </div>

      <div class="preview-container">
        <canvas id="flyerCanvas"></canvas>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
